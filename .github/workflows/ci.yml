name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint skills, agents, and manifests
        run: bash scripts/lint-skills.sh

      - name: Self-test the linter
        run: bash tests/run.sh
